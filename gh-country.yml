            - heading "Who Are We?" [level=2] [ref=e26]
            - paragraph [ref=e28]: Postman is the world’s leading API platform, used by more than 45 million+ developers and 500,000 organizations, including 98% of the Fortune 500. Postman is helping developers and professionals across the globe build the API-first world by simplifying each step of the API lifecycle and streamlining collaboration—enabling users to create better APIs, faster.
            - paragraph [ref=e29]: The company is headquartered in San Francisco and has offices in Boston, New York, Austin, Tokyo, London, and Bangalore - where Postman was founded. Postman is privately held, with funding from Battery Ventures, BOND, Coatue, CRV, Insight Partners, and Nexus Venture Partners. Learn more at postman.com or connect with Postman on X via @getpostman.
            - paragraph [ref=e30]
          - generic [ref=e39]:
            - heading "The Opportunity" [level=2] [ref=e40]
            - paragraph [ref=e41]: Product Trust is a team at Postman to ensure Postman is a safe and trusted platform for our customers. This team is responsible for building security solutions within the Postman ecosystem – from deciding what the product should look like to actually building and delivering it. Product Trust serves as the conduit between customer-facing teams and the engineering team, to independently deliver solutions to address the security, compliance and governance needs of our customers.
