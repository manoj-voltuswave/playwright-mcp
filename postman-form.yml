          - generic [ref=e25]:
            - heading "Who Are We?" [level=2] [ref=e26]:
              - strong [ref=e27]: Who Are We?
            - paragraph [ref=e28]: Postman is the world’s leading API platform, used by more than 45 million+ developers and 500,000 organizations, including 98% of the Fortune 500. Postman is helping developers and professionals across the globe build the API-first world by simplifying each step of the API lifecycle and streamlining collaboration—enabling users to create better APIs, faster.
            - paragraph [ref=e29]: The company is headquartered in San Francisco and has offices in Boston, New York, Austin, Tokyo, London, and Bangalore - where Postman was founded. Postman is privately held, with funding from Battery Ventures, BOND, Coatue, CRV, Insight Partners, and Nexus Venture Partners. Learn more at postman.com or connect with Postman on X via @getpostman.
            - paragraph [ref=e30]:
              - text: "P.S: We highly recommend reading"
              - link "The \"API-First World\" graphic novel" [ref=e31] [cursor=pointer]:
                - /url: https://api-first-world.com/
              - text: to understand the bigger picture and our vision at Postman.
          - generic [ref=e39]:
            - heading "The Opportunity" [level=2] [ref=e40]
            - paragraph [ref=e41]: Product Trust is a team at Postman to ensure Postman is a safe and trusted platform for our customers. This team is responsible for building security solutions within the Postman ecosystem – from deciding what the product should look like to actually building and delivering it. Product Trust serves as the conduit between customer-facing teams and the engineering team, to independently deliver solutions to address the security, compliance and governance needs of our customers.
            - heading "What You'll Do" [level=2] [ref=e42]
            - list [ref=e43]:
              - listitem [ref=e44]: Contribute to the development of products while working with a cross-functional team of other Developers, Product Managers, Designers, Support and Product, Quality, Security and Platform Engineers.
              - listitem [ref=e45]: Quickly build functional prototypes to solve internal and external use-cases.
              - listitem [ref=e46]: Contribute to the planning and development of major user-facing features.
              - listitem [ref=e47]: Advocate better practises for software engineering by mentoring and encouraging others around you to build a quality product that is secure by design.
              - listitem [ref=e48]: Perform code reviews.
              - listitem [ref=e49]: Own and execute end-to-end initiatives.
            - heading "About You" [level=2] [ref=e50]
            - list [ref=e51]:
              - listitem [ref=e52]: 3-5 years of experience developing complex, distributed software applications at large-scale
              - listitem [ref=e53]: Proficient with React.Js, Javascript/Typescript, node.js and a strong understanding of web fundamentals. Past experience working on API platforms and developer tools is a big plus.
              - listitem [ref=e54]: Strong fundamentals in operating systems, networking, and software design
              - listitem [ref=e55]: You enjoy learning and sharing knowledge within and across teams.
              - listitem [ref=e56]
              - listitem [ref=e58]: Experience and Excitement towards working with global, distributed teams.
              - listitem [ref=e59]
              - listitem [ref=e61]: An innate curiosity about how things work.
          - generic [ref=e62]:
            - heading "What Else?" [level=2] [ref=e63]:
              - strong [ref=e64]: What Else?
            - paragraph [ref=e65]: In addition to Postman's pay-on-performance philosophy, and a flexible schedule working with a fun, collaborative team, Postman offers a comprehensive set of benefits, including full medical coverage, flexible PTO, wellness reimbursement, and a monthly lunch stipend. Along with that, our wellness programs will help you stay in the best of your physical and mental health. Our frequent and fascinating team-building events will keep you connected, while our donation-matching program can support the causes you care about. We’re building a long-term company with an inclusive culture where everyone can be the best version of themselves.
            - paragraph [ref=e66]: At Postman we value in person collaboration. We are in office 5 days a week for all roles based out of our hubs in San Francisco Bay Area, Boston, Austin, Tokyo and London. For roles based in Bangalore, employees currently work in the office three days a week and will transition to five days per week by the end of the year. We were thoughtful in our approach which is based on collaboration and grounded in feedback from our workforce, leadership team, and peers. The benefits of our in office model will be shared knowledge, brainstorming sessions, communication, and building trust in-person that cannot be replicated via zoom.
            - heading "Our Values" [level=2] [ref=e67]:
              - strong [ref=e68]: Our Values
            - paragraph [ref=e69]: At Postman, we create with the same curiosity that we see in our users. We value transparency and honest communication about not only successes, but also failures. In our work, we focus on specific goals that add up to a larger vision. Our inclusive work culture ensures that everyone is valued equally as important pieces of our final product. We are dedicated to delivering the best products we can.
            - heading "Equal opportunity" [level=2] [ref=e70]:
              - strong [ref=e71]: Equal opportunity
            - paragraph [ref=e72]: Postman is an Equal Employment Opportunity and Affirmative Action Employer. Qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender perception or identity, national origin, age, marital status, protected veteran status, or disability status. Headhunters and recruitment agencies may not submit resumes/CVs through this website or directly to managers. Postman does not accept unsolicited headhunter and agency resumes. Postman will not pay fees to any third-party agency or company that does not have a signed agreement with Postman.
